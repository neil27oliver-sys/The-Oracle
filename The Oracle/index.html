<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla's Trigram Oracle</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=AWMjw-JB6E8nFkjToPpNNJkpPk9lxnp1I8IF13-djVLcOQ2daRj2k8tCM4jEHkjm_C8mPpnyO1Wj_rF4&currency=USD&components=buttons,hosted-fields&disable-funding=venmo,credit"></script>
    
    <style>
        :root {
            --bg-dark: #0f131a;
            --accent-red: #b91c1c;
            --accent-olive: #4b5320;
            --card-bg: rgba(17,24,39,0.95);
        }
        body { 
            font-family: 'Playfair Display', serif; 
            background-color: var(--bg-dark); 
            color: #f1f5f9; 
            margin: 0;
            padding: 0;
        }
        .main-bg {
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('assets/teslaoracle.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            overflow-y: auto;
            display: none;
            padding: 20px 0;
            -webkit-overflow-scrolling: touch;
        }
        .modal-content {
            background: #1f2937;
            margin: 20px auto 100px auto;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--accent-red);
            text-align: center;
        }
        #setup-btn { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 50; }
        .btn-locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .btn-active { opacity: 1; cursor: pointer; filter: none; }
        .dice-slot { transition: transform 0.2s; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-bg">
    <img src="assets/monogram.png" alt="Logo" style="position: fixed; top: 1.5rem; left: 1.5rem; width: 55px; z-index: 50;">
    
    <button id="setup-btn" class="btn-locked" onclick="goToSetup()">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/settings.png" alt="Setup" style="width: 32px;">
    </button>

    <div class="relative z-10 flex flex-col align-center px-4 pt-20 pb-10">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4">
                <span class="text-[var(--accent-red)]">T</span>esla's <span class="text-[var(--accent-red)]">T</span>rigram <span class="text-[var(--accent-red)]">O</span>racle
            </h1>
            <p class="text-sm text-gray-400 max-w-lg mx-auto font-['Inter']">
                Ask anything. Unlock full Grok power for $3 one-time to get deep, personalized 3-6-9 insights powered by xAI. [cite: 42]
            </p>
        </header>

        <div id="dice-container" class="flex justify-center gap-6 mb-12 py-6 bg-black/40 rounded-3xl border border-white/5 max-w-xl mx-auto w-full">
        </div>

        <div class="max-w-2xl mx-auto w-full space-y-6">
            <div class="bg-[var(--card-bg)] p-6 rounded-2xl border border-white/10 shadow-2xl">
                <input type="text" id="user-query" placeholder="Transmit your query to the Field..." class="w-full p-4 bg-transparent border-b-2 border-[var(--accent-red)] text-xl outline-none mb-6 font-['Inter']">
                <button onclick="runInitialAnalysis()" class="w-full py-5 rounded-xl bg-gradient-to-r from-[var(--accent-red)] to-red-900 text-white font-bold text-xl shadow-lg">
                    Ignite the Oracle
                </button>
            </div>

            <div id="resonance-box" class="bg-[var(--card-bg)] p-8 rounded-2xl border border-[var(--accent-red)]/30 min-h-[300px]">
                <h2 class="text-2xl font-bold text-[var(--accent-red)] mb-4 uppercase tracking-widest border-b border-white/10 pb-2">Field Resonance:</h2>
                <div id="display-text" class="text-lg leading-relaxed text-gray-200 font-['Inter']">
                    The Field awaits your transmission...
                </div>

                <div id="nav-group" class="hidden mt-8 flex flex-col gap-4">
                    <button id="deep-dive-btn" onclick="startDeepDiveFlow()" class="w-full py-4 bg-[var(--accent-olive)] text-white font-bold rounded-xl text-lg hover:bg-opacity-90">
                        ⚡ Resonance Overdrive (Deep Dive)
                    </button>
                    <button onclick="refreshAndReset()" class="w-full py-4 bg-gray-800 text-white font-bold rounded-xl text-lg">
                        ← Back to Initial Screen
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="pay-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 class="text-3xl font-black text-[var(--accent-red)] mb-2">Unlock the Deep Dive</h2>
        <p class="text-gray-400 mb-8 font-['Inter']">Unlock full Grok-4 Analysis for a one-time payment of $3.</p>
        <div id="paypal-button-container" class="w-full"></div>
        <button onclick="closePaywall()" class="mt-6 text-gray-500 underline text-sm">Cancel Transaction</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'oracle_paid_status';
    let isPaid = localStorage.getItem(STORAGE_KEY) === 'true';
    let currentTrigrams = [3, 6, 9];

    window.onload = () => {
        renderTrigrams();
        checkPaymentStatus();
    };

    function checkPaymentStatus() {
        const btn = document.getElementById('setup-btn');
        if (isPaid) {
            btn.classList.replace('btn-locked', 'btn-active'); // [cite: 35]
        }
    }

    function goToSetup() {
        if (isPaid) window.location.href = 'setup.html'; // [cite: 36]
        else alert("Unlock Full Access to enter Setup.");
    }

    function renderTrigrams() {
        const cont = document.getElementById('dice-container');
        const map = { 3: '⧋', 6: '⧉', 9: '⧇' };
        const colorMap = { 3: 'text-red-900', 6: 'text-rose-400', 9: 'text-red-600' };
        cont.innerHTML = currentTrigrams.map((v, i) => `
            <div onclick="rollOne(${i})" class="dice-slot text-7xl md:text-8xl font-black ${colorMap[v]}">
                ${map[v]}
            </div>
        `).join('');
    }

    function rollOne(i) {
        currentTrigrams[i] = [3, 6, 9][Math.floor(Math.random() * 3)];
        renderTrigrams();
    }

    function runInitialAnalysis() {
        const query = document.getElementById('user-query').value.trim();
        if(!query) return alert("Please enter a query.");

        document.getElementById('display-text').innerHTML = `
            <strong>Trigram Logic</strong>: ${currentTrigrams.join('-')}<br><br>
            Short promo insight: "${query}" is vibrating within the 3-6-9 frequency grid.<br><br>
            The Oracle decodes your questions using Tesla's sacred pattern—past, present, and future energy flow. Unlock full mode for long, detailed Grok-powered revelations and deep overdrive analysis.
        `;
        document.getElementById('nav-group').classList.remove('hidden');
    }

    function startDeepDiveFlow() {
        if (!isPaid) {
            document.getElementById('pay-modal').style.display = 'block';
            renderPayPal();
        } else {
            executeGrokAnalysis();
        }
    }

    function renderPayPal() {
        document.getElementById('paypal-button-container').innerHTML = '';
        paypal.Buttons({
            createOrder: (data, actions) => {
                return actions.order.create({
                    purchase_units: [{ amount: { value: '3.00' } }],
                    application_context: { shipping_preference: 'NO_SHIPPING' }
                });
            },
            onApprove: (data, actions) => {
                return actions.order.capture().then(details => {
                    localStorage.setItem(STORAGE_KEY, 'true');
                    isPaid = true;
                    checkPaymentStatus();
                    closePaywall();
                    window.location.href = 'setup.html'; // [cite: 48]
                });
            }
        }).render('#paypal-button-container');
    }

    async function executeGrokAnalysis() {
        const key = localStorage.getItem('oracle_xai_key');
        if (!key) {
            alert("Payment confirmed! Please go to Setup to add your xAI API key.");
            window.location.href = 'setup.html';
            return;
        }

        const out = document.getElementById('display-text');
        out.innerHTML = "<div class='animate-pulse'>Accessing the Tesla Field through Grok...</div>";
        document.getElementById('deep-dive-btn').classList.add('hidden');

        try {
            const response = await fetch("https://api.x.ai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                body: JSON.stringify({
                    model: "grok-4",
                    messages: [{ role: "system", content: "Provide a massive, detailed 3-6-9 analysis." },
                               { role: "user", content: document.getElementById('user-query').value }]
                })
            });
            const data = await response.json();
            out.innerHTML = `<div class='whitespace-pre-wrap'>${data.choices[0].message.content}</div>`;
        } catch (e) {
            out.textContent = "Resonance Error. Please check your API key in Setup.";
            document.getElementById('deep-dive-btn').classList.remove('hidden');
        }
    }

    /**
     * SOLUTION: Refresh and Reset 
     * Triggers a page reload to ensure a perfectly clean initial state.
     */
    function refreshAndReset() {
        window.location.reload();
    }

    function closePaywall() { document.getElementById('pay-modal').style.display = 'none'; }
</script>

</body>
</html>
